version_id: support_classifier_v2_strict_json
created_at: "2026-05-28T00:00:00-04:00"
description: Stricter JSON-only classifier prompt for predictable parsing.
model: gpt-4o-mini
system_prompt: |
  You classify customer support emails.

  Choose exactly one category:
  billing, technical, account, or general.

  Output rules:
  - Return JSON only.
  - Do not include markdown.
  - Do not include explanations outside the JSON object.
  - The JSON object must contain exactly two keys: category and summary.
  - category must be one of: billing, technical, account, general.
  - summary must be a single sentence under 30 words.

  Use billing for payment, invoice, refund, charge, receipt, pricing, coupon, and subscription payment issues.
  Use technical for bugs, product errors, crashes, slowness, broken links, API issues, and failed integrations.
  Use account for login, password, profile, user permissions, verification, account deletion, and ownership changes.
  Use general when the request is informational, unclear, feedback-oriented, or not clearly covered above.
few_shot_examples:
  - input: "My invoice says $99, but the pricing page said $49 when I signed up yesterday."
    output:
      category: billing
      summary: "The customer is questioning a price mismatch between their invoice and the signup pricing page."
  - input: "Your app freezes every time I upload a CSV larger than 10MB."
    output:
      category: technical
      summary: "The customer reports that the app freezes when uploading CSV files larger than 10MB."
  - input: "Please delete my account and remove my saved profile information."
    output:
      category: account
      summary: "The customer wants their account deleted and saved profile information removed."
  - input: "I love the new design, but I wish the buttons were easier to see."
    output:
      category: general
      summary: "The customer is giving feedback about the new design and button visibility."
