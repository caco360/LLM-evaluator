on:
  pull_request:
    paths:
      - "prompts/**"
  push:
    branches:
      - main
    paths:
      - "prompts/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python src/ci_eval.py --candidate-prompt prompts/support_classifier_v3_edge_cases.yaml
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: model-regression-report
            path: src/runs/reports/latest_run_report.html

      - name: Upload PR comment
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: model-regression-pr-comment
            path: src/runs/reports/pr_comment.md